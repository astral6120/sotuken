<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在の混雑状況</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 20px;
            background-color: #f5f7fa;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>現在の混雑状況</h1>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // 設定値
        const liffId = "2010448189-uyZ55xBO";
        const gasUrl = "https://script.google.com/macros/s/AKfycbyqiQ79HIhe3w1msz5KOgVyrou_QVvooVaVsU0RJo4jyB4sTK5wHln5kTeI5ZZMGkDN4g/exec"; // 👈 ここにご自身のGASのURLを貼り付けてください

        // LIFF初期化とアクセス制限の関数
        async function initializeLiff() {
            try {
                // LIFFの初期化
                await liff.init({ liffId: liffId });

                // 【重要】LINEアプリ内（LIFF環境）から開かれているかチェック
                if (!liff.isInClient()) {
                    // LINE以外（普通のブラウザなど）から開かれた場合は、画面をロックする
                    document.body.innerHTML = `
                <div style="text-align:center; padding:50px; font-weight:bold; color:#ff4d4f; font-family:sans-serif;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 10px;">アクセスエラー</h2>
                    <p style="font-size: 1rem; color: #666;">このページはLINE公式アカウントからのみ閲覧可能です。</p>
                </div>`;
                    return;
                }

                // LINEから開かれていれば、グラフの描画処理をスタート
                fetchAndRenderChart();

                // 5秒ごとのリアルタイム自動更新タイマーを起動
                setInterval(function () {
                    const chartStatus = Chart.getChart("myChart");
                    if (chartStatus != undefined) {
                        chartStatus.destroy(); // 古いグラフを破棄して再描画
                    }
                    fetchAndRenderChart();
                }, 5000);

            } catch (error) {
                console.error("LIFFの初期化に失敗しました:", error);
            }
        }

        // GASからデータを取得してグラフを描画する関数
        async function fetchAndRenderChart() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();

                // データの並び替え（必要に応じて時間を古い順にする処理など）
                data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                const labels = data.map(item => {
                    const date = new Date(item.timestamp);
                    return `${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                });
                const counts = data.map(item => item.count);

                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '混雑度（人数）',
                            data: counts,
                            borderColor: '#06c755', // LINEカラー風の緑
                            backgroundColor: 'rgba(6, 199, 85, 0.1)',
                            borderWidth: 3,
                            pointRadius: 4,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("データの取得またはグラフの描画に失敗しました:", error);
            }
        }

        // ページが読み込まれたら、まずLIFFのセキュリティチェックを実行
        initializeLiff();
    </script>

</body>

</html>
