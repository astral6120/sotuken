<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムグラフ画面</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>スプレッドシート同期 リアルタイムグラフ</h1>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // ★ここにGASで発行された「ウェブアプリのURL」を貼り付けてください
        const gasUrl = "https://script.google.com/macros/s/AKfycbwcGpE-elLWC8w7G_8dAIX1Yqt_tCwyL2QGkoiuacB9opeLuW04tbr7rewLZyM05JK1DA/exec";

        // データをGASから取得してグラフを描画する関数
        async function fetchAndRenderChart() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();

                // 1. 横軸（ラベル）に使う「時間」のデータを取得
                const labels = data.map(item => item["時間"]);

                // 2. 各列のデータをそれぞれ取得
                const dataA = data.map(item => item["A(1年)"]);
                const dataB = data.map(item => item["B(2年)"]);
                const dataC = data.map(item => item["C(高学年)"]);
                const dataD = data.map(item => item["D(1年女子)"]);
                const dataE = data.map(item => item["E(女子)"]);

                // 3. グラフを描画
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line', // 折れ線グラフ（棒グラフにするなら 'bar'）
                    data: {
                        labels: labels, // 横軸（時間）
                        datasets: [
                            {
                                label: 'A(1年)',
                                data: dataA,
                                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                                borderColor: 'rgba(255, 99, 132, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'B(2年)',
                                data: dataB,
                                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'C(高学年)',
                                data: dataC,
                                backgroundColor: 'rgba(255, 206, 86, 0.2)',
                                borderColor: 'rgba(255, 206, 86, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'D(1年女子)',
                                data: dataD,
                                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                                borderColor: 'rgba(75, 192, 192, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'E(女子)',
                                data: dataE,
                                backgroundColor: 'rgba(153, 102, 255, 0.2)',
                                borderColor: 'rgba(153, 102, 255, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true // Y軸を0からスタート
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
            }
        }

        // ページが開かれたときに実行
        fetchAndRenderChart();
    </script>

</body>

</html>
