<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>これまでのデータ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>過去のデータグラフ</h1>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // 設定値
        const liffId = "2010448189-uyZ55xBO";
        // ★ここにGASで発行された「ウェブアプリのURL」を貼り付けてください
        const gasUrl = "https://script.google.com/macros/s/AKfycbyqiQ79HIhe3w1msz5KOgVyrou_QVvooVaVsU0RJo4jyB4sTK5wHln5kTeI5ZZMGkDN4g/exec";

        // LINE以外からのアクセスをブロックするセキュリティチェック
        async function initializeLiff() {
            try {
                // LIFFの初期化
                await liff.init({ liffId: liffId });

                // LINEアプリ内（LIFF環境）から開かれているかチェック
                if (!liff.isInClient()) {
                    // LINE以外（普通のブラウザなど）から開かれた場合は、画面をロック
                    document.body.innerHTML = `
                    <div style="text-align:center; padding:50px; font-weight:bold; color:#ff4d4f; font-family:sans-serif;">
                        <h2 style="font-size: 1.8rem; margin-bottom: 10px;">アクセスエラー</h2>
                        <p style="font-size: 1rem; color: #666;">このページはLINE公式アカウントからのみ閲覧可能です。</p>
                    </div>`;
                    return;
                }

                // LINEから開かれていれば、メインのグラフ処理をスタート
                main();

            } catch (error) {
                console.error("LIFFの初期化に失敗しました:", error);
                // エラー時も安全のため一応元々の処理を動かす
                main();
            }
        }

        // 初回実行のみを行う関数（すぐ消えるバグ対策で自動更新は止めています）
        async function main() {
            await fetchAndRenderChart();
        }

        // データをGASから取得してグラフを描画する関数
        async function fetchAndRenderChart() {
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();

                // 1. 横軸（ラベル）に使う「時間」のデータを正しく時間に変換して取得
                const labels = data.map(item => {
                    const date = new Date(item["時間"]);
                    return `${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                });

                // 2. 各列のデータをそれぞれ取得
                const dataA = data.map(item => item["A(1年)"]);
                const dataB = data.map(item => item["B(2年)"]);
                const dataC = data.map(item => item["C(高学年)"]);
                const dataD = data.map(item => item["D(1年女子)"]);
                const dataE = data.map(item => item["E(女子)"]);

                // 3. グラフを描画
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line', // 折れ線グラフ
                    data: {
                        labels: labels, // 横軸（時間）
                        datasets: [
                            {
                                label: 'A(1年)',
                                data: dataA,
                                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                                borderColor: 'rgba(255, 99, 132, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'B(2年)',
                                data: dataB,
                                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'C(高学年)',
                                data: dataC,
                                backgroundColor: 'rgba(255, 206, 86, 0.2)',
                                borderColor: 'rgba(255, 206, 86, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'D(1年女子)',
                                data: dataD,
                                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                                borderColor: 'rgba(75, 192, 192, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            },
                            {
                                label: 'E(女子)',
                                data: dataE,
                                backgroundColor: 'rgba(153, 102, 255, 0.2)',
                                borderColor: 'rgba(153, 102, 255, 1)',
                                borderWidth: 2,
                                tension: 0.1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true // Y軸を0からスタート
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
            }
        }

        // ページ読み込み時に、まずLINEのチェックから起動する
        initializeLiff();
    </script>

</body>

</html>
